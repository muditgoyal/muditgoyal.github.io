name: Scrape SF Events

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    paths:
      - 'sf-events/scraper.py'
      - '.github/workflows/scrape-events.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: sf-events
        run: uv sync

      - name: Run scraper
        working-directory: sf-events
        run: uv run python scraper.py

      - name: Commit and push if events changed
        run: |
          cd sf-events
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          if git diff --staged --quiet; then
            echo "No changes to events.json"
          else
            git commit -m "chore: update SF events data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
